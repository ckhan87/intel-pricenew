          setSelectedArticle(newSelected || null);
        } else if (window.innerWidth >= 1024) {
          setSelectedArticle(generatedNews[0]);
        }
        
        // Reset AI states when context changes so we don't display the wrong language
        setAiResponse('');
        setAiError('');
        setQuickInsight({ type: null, text: '', loading: false, error: '' });
      }, [activeCompany, language]);

      // Initial Load
      useEffect(() => {
        fetchPrices();
        const savedKey = localStorage.getItem('deepseek_api_key');
        if (savedKey) setApiKey(savedKey);
      }, []);

      const handleSaveKey = (e) => {
        e.preventDefault();
        localStorage.setItem('deepseek_api_key', apiKey);
        setShowSettings(false);
      };

      const getAiSuggestion = async () => {
        if (!apiKey) {
          setShowSettings(true);
          setAiError(language === 'zh' ? "请先配置您的 DeepSeek API 密钥。" : "Please configure your DeepSeek API key first.");
          return;
        }

        if (!selectedArticle) return;

        setIsLoadingAi(true);
        setAiResponse('');
        setAiError('');

        const langInstruction = language === 'zh' 
          ? "CRITICAL REQUIREMENT: YOU MUST RESPOND ENTIRELY IN SIMPLIFIED CHINESE (简体中文)." 
          : "Please respond entirely in English.";

        try {
          const response = await fetch('https://api.deepseek.com/chat/completions', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${apiKey}`
            },
            body: JSON.stringify({
              model: 'deepseek-chat',
              messages: [
                {
                  role: 'system',
                  content: `You are an expert options trading analyst. Analyze the provided news article summary and the current ${activeCompany.name} (${activeCompany.id}) stock price. Provide a specific technical and strategic opinion on whether a trader should buy ${activeCompany.id} call options right now. Provide 3 highly specific, actionable insights, potentially suggesting strike prices, expirations, or technical setups based on this catalyst. Format your response with clear bullet points. Keep it concise, professional, and forward-looking. ${langInstruction}`
                },
                {
                  role: 'user',
                  content: `Current ${activeCompany.id} Stock Price: $${prices[activeCompany.id] || 'Unknown'}\n\nNews Title: ${selectedArticle.title}\nDate: ${selectedArticle.date}\nSummary: ${selectedArticle.summary}`
                }
              ],
              temperature: 0.7,
              max_tokens: 600
            })
          });

          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.error?.message || `API Error: ${response.status}`);
          }

          setAiResponse(data.choices[0].message.content);
        } catch (err) {
          console.error("DeepSeek API Error:", err);
          setAiError(err.message || (language === 'zh' ? "获取 AI 建议失败，请检查 API 密钥和网络。" : "Failed to fetch AI suggestions. Please check your API key and network connection."));
        } finally {
          setIsLoadingAi(false);
        }
      };

      const handleQuickAction = async (actionType) => {
        if (!apiKey) {
          setShowSettings(true);
          setQuickInsight({ type: null, text: '', loading: false, error: language === 'zh' ? '请先配置您的 API 密钥。' : 'Please configure your DeepSeek API key first.' });
          return;
        }

        if (!selectedArticle) return;
        
        setQuickInsight({ type: actionType, text: '', loading: true, error: '' });
        
        const langInstruction = language === 'zh' 
          ? "CRITICAL REQUIREMENT: YOU MUST RESPOND ENTIRELY IN SIMPLIFIED CHINESE (简体中文)." 
          : "Please respond entirely in English.";

        let systemPrompt = "";
        if (actionType === 'explain') {
          systemPrompt = `You are a tech educator. Explain the complex technology or business concept mentioned in this ${activeCompany.name} article in simple terms (Explain Like I'm 5). Keep it to 2-3 short paragraphs. ${langInstruction}`;
        } else if (actionType === 'competitors') {
          systemPrompt = `You are an industry analyst. Briefly analyze how this ${activeCompany.name} news impacts its main competitors. Use bullet points and keep it concise. ${langInstruction}`;
        } else if (actionType === 'sentiment') {
          systemPrompt = `You are a financial sentiment analyzer. Rate the sentiment of this news for ${activeCompany.id} stock as BULLISH, BEARISH, or NEUTRAL. Provide a score from 1-100 and a 1-sentence justification. Format your response cleanly. ${langInstruction}`;
        } else if (actionType === 'takeaways') {
          systemPrompt = `Extract the 3 most crucial factual takeaways from this ${activeCompany.name} article. Keep them strictly factual and brief. Use bullet points. ${langInstruction}`;
        } else if (actionType === 'risk') {
          systemPrompt = `Identify the top 2 biggest risks, drawbacks, or headwinds mentioned or implied by this news for ${activeCompany.name}. Be highly critical and concise. Use bullet points. ${langInstruction}`;
        }

        try {
          const response = await fetch('https://api.deepseek.com/chat/completions', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${apiKey}`
            },
            body: JSON.stringify({
              model: 'deepseek-chat',
              messages: [
                { role: 'system', content: systemPrompt },
                { role: 'user', content: `Title: ${selectedArticle.title}\nSummary: ${selectedArticle.summary}` }
              ],
              temperature: 0.7,
              max_tokens: 500
            })
          });

          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.error?.message || `API Error: ${response.status}`);
          }

          const generatedText = data.choices[0].message.content;
          setQuickInsight({ type: actionType, text: generatedText, loading: false, error: '' });
        } catch (err) {
          console.error("DeepSeek API Error:", err);
          setQuickInsight(prev => ({ ...prev, loading: false, error: (language === 'zh' ? "获取洞察失败: " : "Failed to load insights. ") + err.message }));
        }
      };

      const handleSelectArticle = (article) => {
        setSelectedArticle(article);
        setAiResponse('');
        setAiError('');
        setQuickInsight({ type: null, text: '', loading: false, error: '' });
      };

      const toggleLanguage = () => {
        setLanguage(prev => prev === 'en' ? 'zh' : 'en');
      };

      return (
        <div className="min-h-screen bg-slate-50 flex flex-col h-[100dvh]">
          {/* Header & Multi-Ticker Dashboard */}
          <header className="bg-blue-900 text-white shadow-md flex-none z-20">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="flex flex-col md:flex-row justify-between md:items-center py-3 md:h-16 gap-3 md:gap-0">
                
                {/* Logo Area & Mobile Controls */}
                <div className="flex items-center justify-between">
                  <div className="flex items-center space-x-3">
                    <div className="bg-blue-600 p-1.5 md:p-2 rounded-lg">
                      <Newspaper className="w-5 h-5 md:w-6 md:h-6 text-white" />
                    </div>
                    <h1 className="text-lg md:text-xl font-bold tracking-tight">{t.appTitle}<span className="text-blue-300">{t.appTitleHighlight}</span></h1>
                  </div>
                  
                  {/* Mobile Right Controls */}
                  <div className="md:hidden flex items-center space-x-2">
                    <button 
                      onClick={toggleLanguage}
                      className="flex items-center text-blue-200 hover:text-white px-2 py-1.5 rounded-lg border border-blue-700/50 bg-blue-800/30 text-xs font-bold"
                    >
                      <Globe className="w-4 h-4 mr-1" />
                      {language === 'en' ? '中文' : 'EN'}
                    </button>
                    <button 
                      onClick={() => setShowSettings(true)}
                      className="flex items-center text-blue-200 hover:text-white p-2"
                    >
                      <Settings className="w-5 h-5" />
                    </button>
                  </div>
                </div>

                {/* Live Ticker Tape / Company Selector */}
                <div className="flex overflow-x-auto no-scrollbar space-x-2 md:space-x-3 pb-1 md:pb-0 items-center snap-x">
                  {COMPANIES.map(company => (
                    <button 
                      key={company.id}
                      onClick={() => setActiveCompany(company)}
                      className={`flex items-center px-3 py-1.5 md:py-1.5 rounded-lg text-xs md:text-sm font-medium shadow-sm border transition-all cursor-pointer whitespace-nowrap snap-start focus:outline-none ${
                        activeCompany.id === company.id 
                          ? 'bg-blue-700/90 border-blue-400 ring-1 ring-blue-400' 
                          : 'bg-blue-800/40 border-transparent hover:bg-blue-800/80 hover:border-blue-600'
                      }`}
                    >
                      <TrendingUp className={`w-3 h-3 md:w-4 md:h-4 mr-1.5 ${activeCompany.id === company.id ? 'text-emerald-400' : 'text-slate-400'}`} />
                      <span className={`mr-1 ${activeCompany.id === company.id ? 'text-blue-100' : 'text-blue-300'}`}>{company.id}:</span>
                      <span className="font-bold text-white">
                        {isLoadingPrice ? '...' : (prices[company.id] ? `$${prices[company.id]}` : '--')}
                      </span>
                    </button>
                  ))}
                  
                  {/* Desktop Controls */}
                  <div className="hidden md:flex items-center pl-2 space-x-2 border-l border-blue-700/50 ml-2">
                    <button 
                      onClick={toggleLanguage}
                      className="flex items-center text-blue-200 hover:text-white hover:bg-blue-800 px-3 py-1.5 rounded-lg text-sm font-medium transition-colors"
                    >
                      <Globe className="w-4 h-4 mr-1.5" />
                      {language === 'en' ? '中文' : 'EN'}
                    </button>
                    <button 
                      onClick={() => setShowSettings(true)}
                      className="flex items-center bg-blue-800 hover:bg-blue-700 border border-transparent hover:border-blue-600 transition-colors px-3 py-1.5 rounded-lg text-sm font-medium shadow-sm"
                    >
                      <Settings className="w-4 h-4 mr-1.5" />
                      <span>{t.settings}</span>
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </header>

          {/* Main Content Area */}
          <main className="flex-1 max-w-7xl mx-auto w-full lg:px-8 lg:py-6 overflow-hidden relative">
            <div className="flex flex-col lg:flex-row gap-0 lg:gap-6 h-full absolute inset-0 lg:static">
              
              {/* Left Column: News Feed */}
              <div className={`w-full lg:w-1/3 flex-col h-full bg-slate-50 lg:bg-transparent p-4 lg:p-0 ${selectedArticle ? 'hidden lg:flex' : 'flex'}`}>
                <div className="flex items-center justify-between mb-3 lg:mb-4 flex-none">
                  <h2 className="text-lg font-semibold text-slate-700 flex items-center">
                    <Newspaper className="w-5 h-5 mr-2 text-blue-600"/> 
                    {activeCompany.name} {t.news}
                  </h2>
                  <span className="text-xs font-medium bg-blue-100 text-blue-800 px-2 py-1 rounded-full">{activeCompany.id}</span>
                </div>
                
                <div className="flex-1 overflow-y-auto space-y-3 lg:space-y-4 lg:pr-2 custom-scrollbar pb-6 lg:pb-0">
                  {news.map((article) => (
                    <div 
                      key={article.id}
                      onClick={() => handleSelectArticle(article)}
                      className={`p-4 rounded-xl border transition-all cursor-pointer ${
                        selectedArticle?.id === article.id 
                          ? 'bg-blue-50 border-blue-400 shadow-md ring-1 ring-blue-400 lg:shadow-sm lg:ring-0' 
                          : 'bg-white border-slate-200 hover:border-blue-300 shadow-sm'
                      }`}
                    >
                      <div className="text-xs font-medium text-slate-500 mb-2">{article.date}</div>
                      <h3 className={`font-bold leading-snug mb-2 ${selectedArticle?.id === article.id ? 'text-blue-900' : 'text-slate-800'}`}>
                        {article.title}
                      </h3>
                      <p className="text-sm text-slate-600 line-clamp-2">
                        {article.summary}
                      </p>
                    </div>
                  ))}
                </div>
              </div>

              {/* Right Column: Article Details & AI Analyst */}
              <div className={`w-full lg:w-2/3 flex-col h-full bg-white lg:rounded-2xl lg:border border-slate-200 shadow-sm overflow-hidden ${!selectedArticle ? 'hidden lg:flex' : 'flex'}`}>
                {selectedArticle ? (
                  <div className="flex flex-col h-full overflow-y-auto custom-scrollbar relative">
                    
                    {/* Mobile Back Button - Sticky Header */}
                    <div className="lg:hidden p-3 border-b border-slate-100 flex items-center bg-white sticky top-0 z-10 shadow-sm">
                      <button 
                        onClick={() => setSelectedArticle(null)} 
                        className="flex items-center text-blue-600 hover:text-blue-800 font-semibold px-2 py-1"
                      >
                        <ArrowLeft className="w-5 h-5 mr-2" /> 
                        {t.backToNews} {activeCompany.name} {t.news}
                      </button>
                    </div>

                    {/* Article Content */}
                    <div className="p-5 md:p-8 border-b border-slate-100 bg-slate-50/50">
                      <div className="inline-block px-3 py-1 rounded-full bg-slate-200 text-slate-700 text-xs font-semibold mb-3 md:mb-4">
                        {selectedArticle.date}
                      </div>
                      <h2 className="text-xl md:text-3xl font-extrabold text-slate-900 mb-3 md:mb-4 leading-tight">
                        {selectedArticle.title}
                      </h2>
                      <p className="text-slate-700 md:text-lg leading-relaxed text-sm md:text-base">
                        {selectedArticle.summary}
                      </p>
                      <a href={selectedArticle.url} className="inline-flex items-center mt-4 text-blue-600 hover:text-blue-800 font-medium text-sm md:text-base">
                        {t.readFull} <ExternalLink className="w-4 h-4 ml-1" />
                      </a>

                      {/* Expanded Quick Insights Section */}
                      <div className="mt-8 pt-6 border-t border-slate-200">
                        <h4 className="text-xs md:text-sm font-bold text-slate-500 uppercase tracking-wider mb-3 flex items-center">
                          <Sparkles className="w-4 h-4 mr-2 text-amber-500" />
                          {t.quickInsights}
                        </h4>
                        
                        <div className="flex flex-wrap gap-2 mb-4">
                          <button
                            onClick={() => handleQuickAction('explain')}
                            disabled={quickInsight.loading}
                            className={`flex items-center px-3 py-2 rounded-lg text-xs md:text-sm font-medium transition-colors border ${
                              quickInsight.type === 'explain' ? 'bg-amber-50 border-amber-300 text-amber-800' : 'bg-white border-slate-200 text-slate-700 hover:bg-slate-50'
                            }`}
                          >
                            {quickInsight.loading && quickInsight.type === 'explain' ? <Loader2 className="w-4 h-4 mr-2 animate-spin text-amber-600" /> : <Cpu className="w-4 h-4 mr-1.5 text-amber-600" />}
                            {t.explainTech}
                          </button>
                          
                          <button
                            onClick={() => handleQuickAction('competitors')}
                            disabled={quickInsight.loading}
                            className={`flex items-center px-3 py-2 rounded-lg text-xs md:text-sm font-medium transition-colors border ${
                              quickInsight.type === 'competitors' ? 'bg-rose-50 border-rose-300 text-rose-800' : 'bg-white border-slate-200 text-slate-700 hover:bg-slate-50'
                            }`}
                          >
                            {quickInsight.loading && quickInsight.type === 'competitors' ? <Loader2 className="w-4 h-4 mr-2 animate-spin text-rose-600" /> : <Swords className="w-4 h-4 mr-1.5 text-rose-600" />}
                            {t.competitors}
                          </button>

                          <button
                            onClick={() => handleQuickAction('sentiment')}
                            disabled={quickInsight.loading}
                            className={`flex items-center px-3 py-2 rounded-lg text-xs md:text-sm font-medium transition-colors border ${
                              quickInsight.type === 'sentiment' ? 'bg-indigo-50 border-indigo-300 text-indigo-800' : 'bg-white border-slate-200 text-slate-700 hover:bg-slate-50'
                            }`}
                          >
                            {quickInsight.loading && quickInsight.type === 'sentiment' ? <Loader2 className="w-4 h-4 mr-2 animate-spin text-indigo-600" /> : <BarChart className="w-4 h-4 mr-1.5 text-indigo-600" />}
                            {t.sentiment}
                          </button>

                          <button
                            onClick={() => handleQuickAction('takeaways')}
                            disabled={quickInsight.loading}
                            className={`flex items-center px-3 py-2 rounded-lg text-xs md:text-sm font-medium transition-colors border ${
                              quickInsight.type === 'takeaways' ? 'bg-emerald-50 border-emerald-300 text-emerald-800' : 'bg-white border-slate-200 text-slate-700 hover:bg-slate-50'
                            }`}
                          >
                            {quickInsight.loading && quickInsight.type === 'takeaways' ? <Loader2 className="w-4 h-4 mr-2 animate-spin text-emerald-600" /> : <ListChecks className="w-4 h-4 mr-1.5 text-emerald-600" />}
                            {t.takeaways}
                          </button>

                          <button
                            onClick={() => handleQuickAction('risk')}
                            disabled={quickInsight.loading}
                            className={`flex items-center px-3 py-2 rounded-lg text-xs md:text-sm font-medium transition-colors border ${
                              quickInsight.type === 'risk' ? 'bg-orange-50 border-orange-300 text-orange-800' : 'bg-white border-slate-200 text-slate-700 hover:bg-slate-50'
                            }`}
                          >
                            {quickInsight.loading && quickInsight.type === 'risk' ? <Loader2 className="w-4 h-4 mr-2 animate-spin text-orange-600" /> : <ShieldAlert className="w-4 h-4 mr-1.5 text-orange-600" />}
                            {t.riskCheck}
                          </button>
                        </div>

                        {quickInsight.error && (
                          <div className="text-sm text-red-600 bg-red-50 p-3 rounded-lg border border-red-100 mb-4 flex items-start">
                             <AlertCircle className="w-4 h-4 mr-2 mt-0.5 flex-shrink-0" />
                            {quickInsight.error}
                          </div>
                        )}
                        
                        {quickInsight.text && !quickInsight.loading && (
                          <div className="bg-white border border-slate-200 p-4 md:p-5 rounded-xl text-slate-700 text-sm md:text-base shadow-sm mt-2">
                            {quickInsight.text.split('\n').map((line, i) => {
                              if (line.trim() === '') return <br key={i} />;
                              const parts = line.split(/(\*\*.*?\*\*)/g);
                              return (
                                <p key={i} className="mb-1">
                                  {parts.map((part, j) => {
                                    if (part.startsWith('**') && part.endsWith('**')) {
                                      return <strong key={j} className="text-slate-900">{part.slice(2, -2)}</strong>;
                                    }
                                    return part;
                                  })}
                                </p>
                              );
                            })}
                          </div>
                        )}
                      </div>
                    </div>

                    {/* AI Analyst Options Section */}
                    <div className="p-5 md:p-8 flex flex-col bg-slate-50/50 border-t border-slate-200 flex-1">
                      <div className="flex flex-col sm:flex-row sm:items-center justify-between mb-6 gap-4">
                        <h3 className="text-lg md:text-xl font-bold text-slate-800 flex items-center">
                          <BrainCircuit className="w-5 h-5 md:w-6 md:h-6 mr-2 text-purple-600" />
                          {t.optionsAnalysis}
                        </h3>
                        <button
                          onClick={getAiSuggestion}
                          disabled={isLoadingAi}
                          className="bg-purple-600 hover:bg-purple-700 disabled:bg-purple-400 text-white px-4 py-2 md:px-5 md:py-2.5 rounded-lg text-sm md:text-base font-medium flex items-center justify-center transition-colors shadow-sm w-full sm:w-auto"
                        >
                          {isLoadingAi ? (
                            <Loader2 className="w-4 h-4 md:w-5 md:h-5 mr-2 animate-spin" />
                          ) : (
                            <TrendingUp className="w-4 h-4 md:w-5 md:h-5 mr-2" />
                          )}
                          {isLoadingAi ? t.analyzing : t.analyzeOptions}
                        </button>
                      </div>

                      {aiError && (
                        <div className="bg-red-50 border border-red-200 text-red-700 p-4 rounded-xl flex items-start mb-6">
                          <AlertCircle className="w-5 h-5 mr-3 mt-0.5 flex-shrink-0" />
                          <div className="text-sm">{aiError}</div>
                        </div>
                      )}

                      {aiResponse ? (
                        <div className="prose prose-slate max-w-none text-slate-700 bg-purple-50/30 p-5 md:p-6 rounded-xl border border-purple-100 text-sm md:text-base">
                          {aiResponse.split('\n').map((line, i) => {
                            if (line.trim() === '') return <br key={i} />;
                            const parts = line.split(/(\*\*.*?\*\*)/g);
                            return (
                              <p key={i} className="mb-2">
                                {parts.map((part, j) => {
                                  if (part.startsWith('**') && part.endsWith('**')) {
                                    return <strong key={j} className="text-slate-900">{part.slice(2, -2)}</strong>;
                                  }
                                  return part;
                                })}
                              </p>
                            );
                          })}
                        </div>
                      ) : (
                        !isLoadingAi && !aiError && (
                          <div className="flex flex-col items-center justify-center text-center p-8 md:p-12 border-2 border-dashed border-slate-200 rounded-xl bg-slate-50 flex-1 my-4">
                            <div className="bg-purple-100 p-3 md:p-4 rounded-full mb-3 md:mb-4">
                              <BrainCircuit className="w-6 h-6 md:w-8 md:h-8 text-purple-600" />
                            </div>
                            <h4 className="text-base md:text-lg font-semibold text-slate-800 mb-2">{t.readyForAnalysis}</h4>
                            <p className="text-xs md:text-sm text-slate-500 max-w-sm">
                              {t.readyDesc} {activeCompany.id}.
                            </p>
                          </div>
                        )
                      )}
                    </div>

                  </div>
                ) : (
                  <div className="flex items-center justify-center h-full text-slate-500">
                    <div className="flex flex-col items-center">
                      <Newspaper className="w-12 h-12 text-slate-300 mb-4" />
                      <p>{t.selectArticle}</p>
                    </div>
                  </div>
                )}
              </div>
            </div>
          </main>

          {/* Settings Modal */}
          {showSettings && (
            <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-50 p-4">
              <div className="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden animate-in fade-in zoom-in duration-200">
                <div className="p-5 md:p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                  <h3 className="text-lg md:text-xl font-bold flex items-center text-slate-800">
                    <Key className="w-5 h-5 mr-2 text-slate-500" />
                    {t.apiConfig}
                  </h3>
                  <button 
                    onClick={() => setShowSettings(false)}
                    className="text-slate-400 hover:text-slate-600 transition-colors p-1"
                  >
                    ✕
                  </button>
                </div>
                <form onSubmit={handleSaveKey} className="p-5 md:p-6">
                  <div className="mb-4">
                    <label className="block text-sm font-semibold text-slate-700 mb-2">
                      {t.apiKeyStr}
                    </label>
                    <input
                      type="password"
                      value={apiKey}
                      onChange={(e) => setApiKey(e.target.value)}
                      placeholder="sk-..."
                      className="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                      required
                    />
                    <p className="text-xs text-slate-500 mt-2">
                      {t.apiDesc}
                    </p>
                  </div>
                  <div className="flex justify-end space-x-3 mt-6 md:mt-8">
                    <button
                      type="button"
                      onClick={() => setShowSettings(false)}
                      className="px-4 py-2 text-slate-600 hover:bg-slate-100 rounded-lg text-sm md:text-base font-medium transition-colors"
                    >
                      {t.cancel}
                    </button>
                    <button
                      type="submit"
                      className="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm md:text-base font-medium transition-colors"
                    >
                      {t.save}
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    }

    // --- Render App ---
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
