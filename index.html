<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Intel News & AI Insights</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel for in-browser JSX compilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background-color: #cbd5e1;
      border-radius: 20px;
    }
    @media (min-width: 1024px) {
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans selection:bg-blue-200 overflow-hidden">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- Inline Icon Components (Replacing lucide-react for standalone HTML) ---
    const SvgIcon = ({ children, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        {children}
      </svg>
    );
    const Newspaper = ({className}) => <SvgIcon className={className}><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/><path d="M18 14h-8"/><path d="M15 18h-5"/><path d="M10 6h8v4h-8V6Z"/></SvgIcon>;
    const BrainCircuit = ({className}) => <SvgIcon className={className}><path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z"/><path d="M9 13a4.5 4.5 0 0 0 3-4"/><path d="M6.003 5.125A3 3 0 0 0 6.401 6.5"/><path d="M3.477 10.896a4 4 0 0 1 .585-.396"/><path d="M6 18a4 4 0 0 1-1.967-.516"/><path d="M12 13h4"/><path d="M12 17h4"/><path d="M16 9h2.428a2 2 0 0 0 1.666-.889l.906-1.333a2 2 0 0 1 1.666-.889H24"/><path d="M16 13h2.428a2 2 0 0 0 1.666-.889l.906-1.333a2 2 0 0 1 1.666-.889H24"/><path d="M16 17h2.428a2 2 0 0 0 1.666-.889l.906-1.333a2 2 0 0 1 1.666-.889H24"/></SvgIcon>;
    const Settings = ({className}) => <SvgIcon className={className}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></SvgIcon>;
    const ExternalLink = ({className}) => <SvgIcon className={className}><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></SvgIcon>;
    const Loader2 = ({className}) => <SvgIcon className={className}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></SvgIcon>;
    const AlertCircle = ({className}) => <SvgIcon className={className}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></SvgIcon>;
    const Key = ({className}) => <SvgIcon className={className}><path d="m15.5 7.5 2.3 2.3a1 1 0 0 0 1.4 0l2.1-2.1a1 1 0 0 0 0-1.4L19 4"/><path d="m21 2-9.6 9.6"/><circle cx="7.5" cy="15.5" r="5.5"/></SvgIcon>;
    const TrendingUp = ({className}) => <SvgIcon className={className}><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></SvgIcon>;
    const Sparkles = ({className}) => <SvgIcon className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></SvgIcon>;
    const Cpu = ({className}) => <SvgIcon className={className}><rect x="4" y="4" width="16" height="16" rx="2" ry="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="14" x2="23" y2="14"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="14" x2="4" y2="14"/></SvgIcon>;
    const Swords = ({className}) => <SvgIcon className={className}><polyline points="14.5 17.5 3 6 3 3 6 3 17.5 14.5"/><line x1="13" y1="19" x2="19" y2="13"/><line x1="16" y1="16" x2="20" y2="20"/><line x1="19" y1="21" x2="21" y2="19"/><polyline points="14.5 6.5 18 3 21 3 21 6 17.5 9.5"/><line x1="5" y1="14" x2="9" y2="18"/><line x1="7" y1="17" x2="4" y2="20"/><line x1="3" y1="19" x2="5" y2="21"/></SvgIcon>;
    const ArrowLeft = ({className}) => <SvgIcon className={className}><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></SvgIcon>;
    const BarChart = ({className}) => <SvgIcon className={className}><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></SvgIcon>;
    const ListChecks = ({className}) => <SvgIcon className={className}><path d="m3 17 2 2 4-4"/><path d="m3 7 2 2 4-4"/><path d="M13 6h8"/><path d="M13 12h8"/><path d="M13 18h8"/></SvgIcon>;
    const ShieldAlert = ({className}) => <SvgIcon className={className}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M12 8v4"/><path d="M12 16h.01"/></SvgIcon>;

    // --- Mock Data ---
    const MOCK_NEWS = [
      {
        id: 1,
        title: "Intel Unveils Gaudi 3 AI Accelerator to Challenge Nvidia",
        date: "2026-03-12",
        summary: "Intel has officially launched its highly anticipated Gaudi 3 AI accelerator, promising significant performance-per-dollar advantages over competitors. The new chip targets enterprise AI workloads and large language model inference.",
        url: "#"
      },
      {
        id: 2,
        title: "Intel Foundry Achieves Key Milestone on 14A Process Node",
        date: "2026-03-10",
        summary: "Marking a major step in its IDM 2.0 strategy, Intel Foundry announced early test chip success on its advanced 14A process node, utilizing High-NA EUV lithography ahead of its competitors.",
        url: "#"
      },
      {
        id: 3,
        title: "Intel and Microsoft Expand Partnership on AI PCs",
        date: "2026-03-08",
        summary: "A new joint initiative aims to deeply integrate Windows Copilot features directly into Intel's next-generation Core Ultra processors, bringing advanced local AI capabilities to millions of enterprise users.",
        url: "#"
      },
      {
        id: 4,
        title: "Quarterly Earnings: Intel Shows Recovery in Client Computing",
        date: "2026-03-01",
        summary: "Intel's Q1 financial results indicate a strong rebound in the PC market, driven by the refresh cycle and the introduction of AI-enabled PCs. Data center revenues remain highly competitive.",
        url: "#"
      },
      {
        id: 5,
        title: "Intel Announces Expansion of Packaging Facilities in Advanced Hub",
        date: "2026-02-28",
        summary: "To meet growing demand for advanced packaging technologies like Foveros, Intel is committing an additional $2 billion to expand its packaging and testing facilities globally.",
        url: "#"
      }
    ];

    // --- Main Application Component ---
    function App() {
      const [news, setNews] = useState([]);
      const [selectedArticle, setSelectedArticle] = useState(null);
      const [intcPrice, setIntcPrice] = useState(null);
      const [isLoadingPrice, setIsLoadingPrice] = useState(false);
      
      const [quickInsight, setQuickInsight] = useState({ type: null, text: '', loading: false, error: '' });

      const [apiKey, setApiKey] = useState('sk-607570af647e4ce3baabf5f3da383adf');
      const [showSettings, setShowSettings] = useState(false);
      const [aiResponse, setAiResponse] = useState('');
      const [isLoadingAi, setIsLoadingAi] = useState(false);
      const [aiError, setAiError] = useState('');

      const fetchPrice = async () => {
        setIsLoadingPrice(true);
        try {
          const res = await fetch('https://api.codetabs.com/v1/proxy?quest=https://query2.finance.yahoo.com/v8/finance/chart/INTC');
          if (!res.ok) throw new Error('Primary proxy failed');
          const data = await res.json();
          const price = data.chart.result[0].meta.regularMarketPrice;
          setIntcPrice(price.toFixed(2));
        } catch (error) {
          try {
            const targetUrl = encodeURIComponent('https://query2.finance.yahoo.com/v8/finance/chart/INTC');
            const fallbackRes = await fetch(`https://corsproxy.io/?${targetUrl}`);
            if (!fallbackRes.ok) throw new Error('Fallback proxy failed');
            const data = await fallbackRes.json();
            const price = data.chart.result[0].meta.regularMarketPrice;
            setIntcPrice(price.toFixed(2));
          } catch (fallbackError) {
            console.log("Live price fetch restricted by network. Using static fallback.");
            setIntcPrice("45.77");
          }
        } finally {
          setIsLoadingPrice(false);
        }
      };

      useEffect(() => {
        setNews(MOCK_NEWS);
        // Initially don't select an article on mobile, so the list shows first
        if (window.innerWidth >= 1024) {
          setSelectedArticle(MOCK_NEWS[0]);
        }
        fetchPrice();
        
        const savedKey = localStorage.getItem('deepseek_api_key');
        if (savedKey) setApiKey(savedKey);
      }, []);

      const handleSaveKey = (e) => {
        e.preventDefault();
        localStorage.setItem('deepseek_api_key', apiKey);
        setShowSettings(false);
      };

      const getAiSuggestion = async () => {
        if (!apiKey) {
          setShowSettings(true);
          setAiError("Please configure your DeepSeek API key first.");
          return;
        }

        if (!selectedArticle) return;

        setIsLoadingAi(true);
        setAiResponse('');
        setAiError('');

        try {
          const response = await fetch('https://api.deepseek.com/chat/completions', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${apiKey}`
            },
            body: JSON.stringify({
              model: 'deepseek-chat',
              messages: [
                {
                  role: 'system',
                  content: 'You are an expert options trading analyst. Analyze the provided news article summary and the current Intel (INTC) stock price. Provide a specific technical and strategic opinion on whether a trader should buy INTC call options right now. Provide 3 highly specific, actionable insights, potentially suggesting strike prices, expirations, or technical setups based on this catalyst. Format your response with clear bullet points. Keep it concise, professional, and forward-looking.'
                },
                {
                  role: 'user',
                  content: `Current INTC Stock Price: $${intcPrice || 'Unknown'}\n\nNews Title: ${selectedArticle.title}\nDate: ${selectedArticle.date}\nSummary: ${selectedArticle.summary}`
                }
              ],
              temperature: 0.7,
              max_tokens: 500
            })
          });

          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.error?.message || `API Error: ${response.status}`);
          }

          setAiResponse(data.choices[0].message.content);
        } catch (err) {
          console.error("DeepSeek API Error:", err);
          setAiError(err.message || "Failed to fetch AI suggestions. Please check your API key and network connection.");
        } finally {
          setIsLoadingAi(false);
        }
      };

      const handleQuickAction = async (actionType) => {
        if (!apiKey) {
          setShowSettings(true);
          setQuickInsight({ type: null, text: '', loading: false, error: 'Please configure your DeepSeek API key first.' });
          return;
        }

        if (!selectedArticle) return;
        
        setQuickInsight({ type: actionType, text: '', loading: true, error: '' });
        
        let systemPrompt = "";
        if (actionType === 'explain') {
          systemPrompt = "You are a tech educator. Explain the complex semiconductor or AI technology mentioned in this article in simple terms (Explain Like I'm 5). Keep it to 2-3 short paragraphs.";
        } else if (actionType === 'competitors') {
          systemPrompt = "You are a semiconductor industry analyst. Briefly analyze how this Intel news impacts its main competitors (like AMD, Nvidia, TSMC, ARM). Use bullet points and keep it concise.";
        } else if (actionType === 'sentiment') {
          systemPrompt = "You are a financial sentiment analyzer. Rate the sentiment of this news for INTC stock as BULLISH, BEARISH, or NEUTRAL. Provide a score from 1-100 and a 1-sentence justification. Format your response cleanly.";
        } else if (actionType === 'takeaways') {
          systemPrompt = "Extract the 3 most crucial factual takeaways from this article. Keep them strictly factual and brief. Use bullet points.";
        } else if (actionType === 'risk') {
          systemPrompt = "Identify the top 2 biggest risks, drawbacks, or headwinds mentioned or implied by this news for Intel. Be highly critical and concise. Use bullet points.";
        }

        try {
          const response = await fetch('https://api.deepseek.com/chat/completions', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${apiKey}`
            },
            body: JSON.stringify({
              model: 'deepseek-chat',
              messages: [
                { role: 'system', content: systemPrompt },
                { role: 'user', content: `Title: ${selectedArticle.title}\nSummary: ${selectedArticle.summary}` }
              ],
              temperature: 0.7,
              max_tokens: 500
            })
          });

          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.error?.message || `API Error: ${response.status}`);
          }

          const generatedText = data.choices[0].message.content;
          setQuickInsight({ type: actionType, text: generatedText, loading: false, error: '' });
        } catch (err) {
          console.error("DeepSeek API Error:", err);
          setQuickInsight(prev => ({ ...prev, loading: false, error: "Failed to load DeepSeek insights. " + err.message }));
        }
      };

      const handleSelectArticle = (article) => {
        setSelectedArticle(article);
        setAiResponse('');
        setAiError('');
        setQuickInsight({ type: null, text: '', loading: false, error: '' });
      };

      return (
        <div className="min-h-screen bg-slate-50 flex flex-col h-[100dvh]">
          {/* Header */}
          <header className="bg-blue-900 text-white shadow-md flex-none z-20">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="flex justify-between items-center h-16">
                <div className="flex items-center space-x-3">
                  <div className="bg-blue-600 p-1.5 md:p-2 rounded-lg">
                    <Newspaper className="w-5 h-5 md:w-6 md:h-6 text-white" />
                  </div>
                  <h1 className="text-lg md:text-xl font-bold tracking-tight">Intel<span className="text-blue-300">Pulse</span></h1>
                </div>
                <div className="flex items-center space-x-2 md:space-x-4">
                  <div className="flex items-center bg-blue-800/80 border border-blue-700 px-2 md:px-3 py-1.5 rounded-lg text-xs md:text-sm font-medium shadow-sm">
                    <TrendingUp className="w-3 h-3 md:w-4 md:h-4 mr-1 md:mr-2 text-emerald-400" />
                    <span className="text-blue-200 mr-1 hidden sm:inline">INTC:</span>
                    <span className="font-bold text-white">
                      {isLoadingPrice ? '...' : `$${intcPrice}`}
                    </span>
                  </div>
                  <button 
                    onClick={() => setShowSettings(true)}
                    className="flex items-center bg-blue-800 hover:bg-blue-700 transition-colors p-2 md:px-4 md:py-2 rounded-md text-sm font-medium"
                    aria-label="API Settings"
                  >
                    <Settings className="w-4 h-4 md:mr-2" />
                    <span className="hidden md:inline">Settings</span>
                  </button>
                </div>
              </div>
            </div>
          </header>

          {/* Main Content Area */}
          <main className="flex-1 max-w-7xl mx-auto w-full lg:px-8 lg:py-6 overflow-hidden relative">
            <div className="flex flex-col lg:flex-row gap-0 lg:gap-6 h-full absolute inset-0 lg:static">
              
              {/* Left Column: News Feed (Hides on mobile if article is selected) */}
              <div className={`w-full lg:w-1/3 flex-col h-full bg-slate-50 lg:bg-transparent p-4 lg:p-0 ${selectedArticle ? 'hidden lg:flex' : 'flex'}`}>
                <h2 className="text-lg font-semibold mb-3 lg:mb-4 text-slate-700 flex items-center flex-none">
                  <Newspaper className="w-5 h-5 mr-2 text-blue-600"/> Latest News
                </h2>
                <div className="flex-1 overflow-y-auto space-y-3 lg:space-y-4 lg:pr-2 custom-scrollbar pb-6 lg:pb-0">
                  {news.map((article) => (
                    <div 
                      key={article.id}
                      onClick={() => handleSelectArticle(article)}
                      className={`p-4 rounded-xl border transition-all cursor-pointer ${
                        selectedArticle?.id === article.id 
                          ? 'bg-blue-50 border-blue-400 shadow-md ring-1 ring-blue-400 lg:shadow-sm lg:ring-0' 
                          : 'bg-white border-slate-200 hover:border-blue-300 shadow-sm'
                      }`}
                    >
                      <div className="text-xs font-medium text-slate-500 mb-2">{article.date}</div>
                      <h3 className={`font-bold leading-snug mb-2 ${selectedArticle?.id === article.id ? 'text-blue-900' : 'text-slate-800'}`}>
                        {article.title}
                      </h3>
                      <p className="text-sm text-slate-600 line-clamp-2">
                        {article.summary}
                      </p>
                    </div>
                  ))}
                </div>
              </div>

              {/* Right Column: Article Details & AI Analyst */}
              <div className={`w-full lg:w-2/3 flex-col h-full bg-white lg:rounded-2xl lg:border border-slate-200 shadow-sm overflow-hidden ${!selectedArticle ? 'hidden lg:flex' : 'flex'}`}>
                {selectedArticle ? (
                  <div className="flex flex-col h-full overflow-y-auto custom-scrollbar relative">
                    
                    {/* Mobile Back Button - Sticky Header */}
                    <div className="lg:hidden p-3 border-b border-slate-100 flex items-center bg-white sticky top-0 z-10 shadow-sm">
                      <button 
                        onClick={() => setSelectedArticle(null)} 
                        className="flex items-center text-blue-600 hover:text-blue-800 font-semibold px-2 py-1"
                      >
                        <ArrowLeft className="w-5 h-5 mr-2" /> 
                        Back to News List
                      </button>
                    </div>

                    {/* Article Content */}
                    <div className="p-5 md:p-8 border-b border-slate-100 bg-slate-50/50">
                      <div className="inline-block px-3 py-1 rounded-full bg-slate-200 text-slate-700 text-xs font-semibold mb-3 md:mb-4">
                        {selectedArticle.date}
                      </div>
                      <h2 className="text-xl md:text-3xl font-extrabold text-slate-900 mb-3 md:mb-4 leading-tight">
                        {selectedArticle.title}
                      </h2>
                      <p className="text-slate-700 md:text-lg leading-relaxed text-sm md:text-base">
                        {selectedArticle.summary}
                      </p>
                      <a href={selectedArticle.url} className="inline-flex items-center mt-4 text-blue-600 hover:text-blue-800 font-medium text-sm md:text-base">
                        Read full article <ExternalLink className="w-4 h-4 ml-1" />
                      </a>

                      {/* Expanded Quick Insights Section */}
                      <div className="mt-8 pt-6 border-t border-slate-200">
                        <h4 className="text-xs md:text-sm font-bold text-slate-500 uppercase tracking-wider mb-3 flex items-center">
                          <Sparkles className="w-4 h-4 mr-2 text-amber-500" />
                          DeepSeek Quick Insights
                        </h4>
                        
                        <div className="flex flex-wrap gap-2 mb-4">
                          <button
                            onClick={() => handleQuickAction('explain')}
                            disabled={quickInsight.loading}
                            className={`flex items-center px-3 py-2 rounded-lg text-xs md:text-sm font-medium transition-colors border ${
                              quickInsight.type === 'explain' ? 'bg-amber-50 border-amber-300 text-amber-800' : 'bg-white border-slate-200 text-slate-700 hover:bg-slate-50'
                            }`}
                          >
                            {quickInsight.loading && quickInsight.type === 'explain' ? <Loader2 className="w-4 h-4 mr-2 animate-spin text-amber-600" /> : <Cpu className="w-4 h-4 mr-1.5 text-amber-600" />}
                            Explain Tech
                          </button>
                          
                          <button
                            onClick={() => handleQuickAction('competitors')}
                            disabled={quickInsight.loading}
                            className={`flex items-center px-3 py-2 rounded-lg text-xs md:text-sm font-medium transition-colors border ${
                              quickInsight.type === 'competitors' ? 'bg-rose-50 border-rose-300 text-rose-800' : 'bg-white border-slate-200 text-slate-700 hover:bg-slate-50'
                            }`}
                          >
                            {quickInsight.loading && quickInsight.type === 'competitors' ? <Loader2 className="w-4 h-4 mr-2 animate-spin text-rose-600" /> : <Swords className="w-4 h-4 mr-1.5 text-rose-600" />}
                            Competitors
                          </button>

                          <button
                            onClick={() => handleQuickAction('sentiment')}
                            disabled={quickInsight.loading}
                            className={`flex items-center px-3 py-2 rounded-lg text-xs md:text-sm font-medium transition-colors border ${
                              quickInsight.type === 'sentiment' ? 'bg-indigo-50 border-indigo-300 text-indigo-800' : 'bg-white border-slate-200 text-slate-700 hover:bg-slate-50'
                            }`}
                          >
                            {quickInsight.loading && quickInsight.type === 'sentiment' ? <Loader2 className="w-4 h-4 mr-2 animate-spin text-indigo-600" /> : <BarChart className="w-4 h-4 mr-1.5 text-indigo-600" />}
                            Sentiment
                          </button>

                          <button
                            onClick={() => handleQuickAction('takeaways')}
                            disabled={quickInsight.loading}
                            className={`flex items-center px-3 py-2 rounded-lg text-xs md:text-sm font-medium transition-colors border ${
                              quickInsight.type === 'takeaways' ? 'bg-emerald-50 border-emerald-300 text-emerald-800' : 'bg-white border-slate-200 text-slate-700 hover:bg-slate-50'
                            }`}
                          >
                            {quickInsight.loading && quickInsight.type === 'takeaways' ? <Loader2 className="w-4 h-4 mr-2 animate-spin text-emerald-600" /> : <ListChecks className="w-4 h-4 mr-1.5 text-emerald-600" />}
                            Takeaways
                          </button>

                          <button
                            onClick={() => handleQuickAction('risk')}
                            disabled={quickInsight.loading}
                            className={`flex items-center px-3 py-2 rounded-lg text-xs md:text-sm font-medium transition-colors border ${
                              quickInsight.type === 'risk' ? 'bg-orange-50 border-orange-300 text-orange-800' : 'bg-white border-slate-200 text-slate-700 hover:bg-slate-50'
                            }`}
                          >
                            {quickInsight.loading && quickInsight.type === 'risk' ? <Loader2 className="w-4 h-4 mr-2 animate-spin text-orange-600" /> : <ShieldAlert className="w-4 h-4 mr-1.5 text-orange-600" />}
                            Risk Check
                          </button>
                        </div>

                        {quickInsight.error && (
                          <div className="text-sm text-red-600 bg-red-50 p-3 rounded-lg border border-red-100 mb-4 flex items-start">
                             <AlertCircle className="w-4 h-4 mr-2 mt-0.5 flex-shrink-0" />
                            {quickInsight.error}
                          </div>
                        )}
                        
                        {quickInsight.text && !quickInsight.loading && (
                          <div className="bg-white border border-slate-200 p-4 md:p-5 rounded-xl text-slate-700 text-sm md:text-base shadow-sm mt-2">
                            {quickInsight.text.split('\n').map((line, i) => {
                              if (line.trim() === '') return <br key={i} />;
                              const parts = line.split(/(\*\*.*?\*\*)/g);
                              return (
                                <p key={i} className="mb-1">
                                  {parts.map((part, j) => {
                                    if (part.startsWith('**') && part.endsWith('**')) {
                                      return <strong key={j} className="text-slate-900">{part.slice(2, -2)}</strong>;
                                    }
                                    return part;
                                  })}
                                </p>
                              );
                            })}
                          </div>
                        )}
                      </div>
                    </div>

                    {/* AI Analyst Options Section */}
                    <div className="p-5 md:p-8 flex flex-col bg-slate-50/50 border-t border-slate-200 flex-1">
                      <div className="flex flex-col sm:flex-row sm:items-center justify-between mb-6 gap-4">
                        <h3 className="text-lg md:text-xl font-bold text-slate-800 flex items-center">
                          <BrainCircuit className="w-5 h-5 md:w-6 md:h-6 mr-2 text-purple-600" />
                          Options Analysis
                        </h3>
                        <button
                          onClick={getAiSuggestion}
                          disabled={isLoadingAi}
                          className="bg-purple-600 hover:bg-purple-700 disabled:bg-purple-400 text-white px-4 py-2 md:px-5 md:py-2.5 rounded-lg text-sm md:text-base font-medium flex items-center justify-center transition-colors shadow-sm w-full sm:w-auto"
                        >
                          {isLoadingAi ? (
                            <Loader2 className="w-4 h-4 md:w-5 md:h-5 mr-2 animate-spin" />
                          ) : (
                            <TrendingUp className="w-4 h-4 md:w-5 md:h-5 mr-2" />
                          )}
                          {isLoadingAi ? 'Analyzing...' : 'Analyze Call Options'}
                        </button>
                      </div>

                      {aiError && (
                        <div className="bg-red-50 border border-red-200 text-red-700 p-4 rounded-xl flex items-start mb-6">
                          <AlertCircle className="w-5 h-5 mr-3 mt-0.5 flex-shrink-0" />
                          <div className="text-sm">{aiError}</div>
                        </div>
                      )}

                      {aiResponse ? (
                        <div className="prose prose-slate max-w-none text-slate-700 bg-purple-50/30 p-5 md:p-6 rounded-xl border border-purple-100 text-sm md:text-base">
                          {aiResponse.split('\n').map((line, i) => {
                            if (line.trim() === '') return <br key={i} />;
                            const parts = line.split(/(\*\*.*?\*\*)/g);
                            return (
                              <p key={i} className="mb-2">
                                {parts.map((part, j) => {
                                  if (part.startsWith('**') && part.endsWith('**')) {
                                    return <strong key={j} className="text-slate-900">{part.slice(2, -2)}</strong>;
                                  }
                                  return part;
                                })}
                              </p>
                            );
                          })}
                        </div>
                      ) : (
                        !isLoadingAi && !aiError && (
                          <div className="flex flex-col items-center justify-center text-center p-8 md:p-12 border-2 border-dashed border-slate-200 rounded-xl bg-slate-50 flex-1 my-4">
                            <div className="bg-purple-100 p-3 md:p-4 rounded-full mb-3 md:mb-4">
                              <BrainCircuit className="w-6 h-6 md:w-8 md:h-8 text-purple-600" />
                            </div>
                            <h4 className="text-base md:text-lg font-semibold text-slate-800 mb-2">Ready for Analysis</h4>
                            <p className="text-xs md:text-sm text-slate-500 max-w-sm">
                              Generate a technical opinion and call option strategies using the latest INTC price.
                            </p>
                          </div>
                        )
                      )}
                    </div>

                  </div>
                ) : (
                  <div className="flex items-center justify-center h-full text-slate-500">
                    {/* Empty state only seen on large screens before selection */}
                    <div className="flex flex-col items-center">
                      <Newspaper className="w-12 h-12 text-slate-300 mb-4" />
                      <p>Select an article from the feed</p>
                    </div>
                  </div>
                )}
              </div>
            </div>
          </main>

          {/* Settings Modal */}
          {showSettings && (
            <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-50 p-4">
              <div className="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden animate-in fade-in zoom-in duration-200">
                <div className="p-5 md:p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                  <h3 className="text-lg md:text-xl font-bold flex items-center text-slate-800">
                    <Key className="w-5 h-5 mr-2 text-slate-500" />
                    API Configuration
                  </h3>
                  <button 
                    onClick={() => setShowSettings(false)}
                    className="text-slate-400 hover:text-slate-600 transition-colors p-1"
                  >
                    ✕
                  </button>
                </div>
                <form onSubmit={handleSaveKey} className="p-5 md:p-6">
                  <div className="mb-4">
                    <label className="block text-sm font-semibold text-slate-700 mb-2">
                      DeepSeek API Key
                    </label>
                    <input
                      type="password"
                      value={apiKey}
                      onChange={(e) => setApiKey(e.target.value)}
                      placeholder="sk-..."
                      className="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                      required
                    />
                    <p className="text-xs text-slate-500 mt-2">
                      Stored locally in your browser's localStorage. Only sent directly to DeepSeek API.
                    </p>
                  </div>
                  <div className="flex justify-end space-x-3 mt-6 md:mt-8">
                    <button
                      type="button"
                      onClick={() => setShowSettings(false)}
                      className="px-4 py-2 text-slate-600 hover:bg-slate-100 rounded-lg text-sm md:text-base font-medium transition-colors"
                    >
                      Cancel
                    </button>
                    <button
                      type="submit"
                      className="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm md:text-base font-medium transition-colors"
                    >
                      Save Settings
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    }

    // --- Render App ---
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
