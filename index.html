<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>TechPulse Live AI Insights</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel for in-browser JSX compilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }
    @media (min-width: 1024px) { .custom-scrollbar::-webkit-scrollbar { width: 6px; } }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans selection:bg-blue-200 overflow-hidden">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- Inline Icon Components ---
    const SvgIcon = ({ children, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
    );
    const Newspaper = ({className}) => <SvgIcon className={className}><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/><path d="M18 14h-8"/><path d="M15 18h-5"/><path d="M10 6h8v4h-8V6Z"/></SvgIcon>;
    const BrainCircuit = ({className}) => <SvgIcon className={className}><path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z"/><path d="M9 13a4.5 4.5 0 0 0 3-4"/><path d="M6.003 5.125A3 3 0 0 0 6.401 6.5"/><path d="M3.477 10.896a4 4 0 0 1 .585-.396"/><path d="M6 18a4 4 0 0 1-1.967-.516"/><path d="M12 13h4"/><path d="M12 17h4"/><path d="M16 9h2.428a2 2 0 0 0 1.666-.889l.906-1.333a2 2 0 0 1 1.666-.889H24"/><path d="M16 13h2.428a2 2 0 0 0 1.666-.889l.906-1.333a2 2 0 0 1 1.666-.889H24"/><path d="M16 17h2.428a2 2 0 0 0 1.666-.889l.906-1.333a2 2 0 0 1 1.666-.889H24"/></SvgIcon>;
    const Settings = ({className}) => <SvgIcon className={className}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></SvgIcon>;
    const ExternalLink = ({className}) => <SvgIcon className={className}><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></SvgIcon>;
    const Loader2 = ({className}) => <SvgIcon className={className}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></SvgIcon>;
    const AlertCircle = ({className}) => <SvgIcon className={className}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></SvgIcon>;
    const Key = ({className}) => <SvgIcon className={className}><path d="m15.5 7.5 2.3 2.3a1 1 0 0 0 1.4 0l2.1-2.1a1 1 0 0 0 0-1.4L19 4"/><path d="m21 2-9.6 9.6"/><circle cx="7.5" cy="15.5" r="5.5"/></SvgIcon>;
    const TrendingUp = ({className}) => <SvgIcon className={className}><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></SvgIcon>;
    const Sparkles = ({className}) => <SvgIcon className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></SvgIcon>;
    const Cpu = ({className}) => <SvgIcon className={className}><rect x="4" y="4" width="16" height="16" rx="2" ry="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="14" x2="23" y2="14"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="14" x2="4" y2="14"/></SvgIcon>;
    const Swords = ({className}) => <SvgIcon className={className}><polyline points="14.5 17.5 3 6 3 3 6 3 17.5 14.5"/><line x1="13" y1="19" x2="19" y2="13"/><line x1="16" y1="16" x2="20" y2="20"/><line x1="19" y1="21" x2="21" y2="19"/><polyline points="14.5 6.5 18 3 21 3 21 6 17.5 9.5"/><line x1="5" y1="14" x2="9" y2="18"/><line x1="7" y1="17" x2="4" y2="20"/><line x1="3" y1="19" x2="5" y2="21"/></SvgIcon>;
    const ArrowLeft = ({className}) => <SvgIcon className={className}><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></SvgIcon>;
    const BarChart = ({className}) => <SvgIcon className={className}><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></SvgIcon>;
    const ListChecks = ({className}) => <SvgIcon className={className}><path d="m3 17 2 2 4-4"/><path d="m3 7 2 2 4-4"/><path d="M13 6h8"/><path d="M13 12h8"/><path d="M13 18h8"/></SvgIcon>;
    const ShieldAlert = ({className}) => <SvgIcon className={className}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M12 8v4"/><path d="M12 16h.01"/></SvgIcon>;
    const Globe = ({className}) => <SvgIcon className={className}><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/></SvgIcon>;

    // --- Translations Dictionary ---
    const TRANSLATIONS = {
      en: {
        appTitle: "Tech", appTitleHighlight: "Pulse", settings: "Config", news: "News",
        backToNews: "Back to", readFull: "Read original article", quickInsights: "DeepSeek Quick Insights",
        explainTech: "Explain Tech", competitors: "Competitors", sentiment: "Sentiment",
        takeaways: "Takeaways", riskCheck: "Risk Check", optionsAnalysis: "Options Analysis",
        analyzeOptions: "Analyze Call Options", analyzing: "Analyzing...", readyForAnalysis: "Ready for Analysis",
        readyDesc: "Generate a technical opinion and call option strategies using the latest",
        selectArticle: "Select a live news article from the feed", apiConfig: "API Configuration",
        apiKeyStr: "DeepSeek API Key", apiDesc: "Stored locally. Only sent directly to DeepSeek.",
        cancel: "Cancel", save: "Save Settings", live: "LIVE"
      },
      zh: {
        appTitle: "科技", appTitleHighlight: "脉搏", settings: "设置", news: "实时新闻",
        backToNews: "返回", readFull: "阅读原文", quickInsights: "DeepSeek 快速洞察",
        explainTech: "技术解析", competitors: "竞争对手", sentiment: "市场情绪",
        takeaways: "核心摘要", riskCheck: "风险评估", optionsAnalysis: "期权分析",
        analyzeOptions: "分析看涨期权", analyzing: "分析中...", readyForAnalysis: "准备分析",
        readyDesc: "结合最新股价，生成期权技术意见和看涨策略：",
        selectArticle: "请从左侧列表中选择一篇实时新闻", apiConfig: "API 配置",
        apiKeyStr: "DeepSeek API 密钥", apiDesc: "本地存储。仅直接发送至 DeepSeek。",
        cancel: "取消", save: "保存设置", live: "实时"
      }
    };

    const COMPANIES = [
      { id: 'INTC', name: 'Intel' },
      { id: 'NVDA', name: 'Nvidia' },
      { id: 'AMD', name: 'AMD' },
      { id: 'AVGO', name: 'Broadcom' },
      { id: 'TSLA', name: 'Tesla' }
    ];

    // --- Main Application Component ---
    function App() {
      const [activeCompany, setActiveCompany] = useState(COMPANIES[0]);
      const [language, setLanguage] = useState('en');
      
      const [news, setNews] = useState([]);
      const [isLoadingNews, setIsLoadingNews] = useState(false);
      const [selectedArticle, setSelectedArticle] = useState(null);
      
      const [prices, setPrices] = useState({});
      const [isLoadingPrice, setIsLoadingPrice] = useState(false);
      
      const [quickInsight, setQuickInsight] = useState({ type: null, text: '', loading: false, error: '' });
      const [apiKey, setApiKey] = useState('sk-607570af647e4ce3baabf5f3da383adf');
      const [showSettings, setShowSettings] = useState(false);
      const [aiResponse, setAiResponse] = useState('');
      const [isLoadingAi, setIsLoadingAi] = useState(false);
      const [aiError, setAiError] = useState('');

      const t = TRANSLATIONS[language];

      // Fetch Real Live News via public RSS-to-JSON API (with Cache Busting)
      const fetchLiveNews = async (company) => {
        setIsLoadingNews(true);
        try {
          const timestamp = new Date().getTime();
          // Yahoo Finance RSS feed for the specific ticker
          const rssUrl = `https://feeds.finance.yahoo.com/rss/2.0/headline?s=${company.id}&region=US&lang=en-US`;
          // Convert RSS to JSON using a free proxy with cache-busting
          const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}&t=${timestamp}`);
          const data = await res.json();
          
          if (data.status === 'ok' && data.items.length > 0) {
            const liveNews = data.items.map((item, index) => {
              const tmp = document.createElement("DIV");
              tmp.innerHTML = item.description || "Live market update. Click 'Read original article' for full details.";
              const summaryText = tmp.textContent || tmp.innerText || "";
              
              const pubDate = new Date(item.pubDate);
              const formattedDate = isNaN(pubDate) ? item.pubDate : pubDate.toLocaleString();

              return {
                id: index,
                title: item.title,
                date: formattedDate,
                summary: summaryText.substring(0, 300) + (summaryText.length > 300 ? '...' : ''),
                url: item.link
              };
            });
            
            setNews(liveNews);
            if (window.innerWidth >= 1024) setSelectedArticle(liveNews[0]);
          } else {
            throw new Error('No news found');
          }
        } catch (error) {
          console.error("Live news fetch error:", error);
          setNews([{
            id: 0, title: `Unable to fetch live feed for ${company.name}`, 
            date: new Date().toLocaleDateString(), 
            summary: "Please check your internet connection or the RSS proxy might be temporarily rate-limited.", 
            url: "#"
          }]);
        } finally {
          setIsLoadingNews(false);
        }
      };

      // Robust Proxy Waterfall for Live Prices (Cache Busted)
      const fetchPrices = async () => {
        setIsLoadingPrice(true);
        const symbols = COMPANIES.map(c => c.id).join(',');
        const targetUrl = `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${symbols}`;
        const timestamp = new Date().getTime(); // Cache buster

        // Array of proxies to try sequentially
        const proxies = [
          `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl + '&t=' + timestamp)}`,
          `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl)}`,
          `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`
        ];

        let success = false;

        for (const proxy of proxies) {
          if (success) break; // Stop trying if one worked
          try {
            const res = await fetch(proxy);
            if (!res.ok) continue; // Try next proxy
            
            const data = await res.json();
            if (data && data.quoteResponse && data.quoteResponse.result) {
              const newPrices = {};
              data.quoteResponse.result.forEach(quote => {
                newPrices[quote.symbol] = quote.regularMarketPrice.toFixed(2);
              });
              setPrices(newPrices);
              success = true;
            }
          } catch (e) {
            console.warn("Proxy failed, trying next...", proxy);
          }
        }

        if (!success) {
          console.error("All proxies blocked. Network restricts live price fetch.");
          // No more fake numbers. Show N/A if it completely fails.
          const errorPrices = {};
          COMPANIES.forEach(c => errorPrices[c.id] = 'N/A');
          setPrices(errorPrices);
        }
        
        setIsLoadingPrice(false);
      };

      // Handle active company changes
      useEffect(() => {
        setNews([]);
        setSelectedArticle(null);
        setAiResponse('');
        setAiError('');
        setQuickInsight({ type: null, text: '', loading: false, error: '' });
        
        fetchLiveNews(activeCompany);
      }, [activeCompany]);

      // Handle language toggle clears
      useEffect(() => {
        setAiResponse('');
        setAiError('');
        setQuickInsight({ type: null, text: '', loading: false, error: '' });
      }, [language]);

      // Initial Load
      useEffect(() => {
        fetchPrices();
        const savedKey = localStorage.getItem('deepseek_api_key');
        if (savedKey) setApiKey(savedKey);
        
        // Refresh prices every 60 seconds
        const priceInterval = setInterval(fetchPrices, 60000);
        return () => clearInterval(priceInterval);
      }, []);

      const handleSaveKey = (e) => {
        e.preventDefault();
        localStorage.setItem('deepseek_api_key', apiKey);
        setShowSettings(false);
      };

      const getAiSuggestion = async () => {
        if (!apiKey) {
          setShowSettings(true);
          setAiError(language === 'zh' ? "请先配置您的 DeepSeek API 密钥。" : "Please configure your DeepSeek API key first.");
          return;
        }
        if (!selectedArticle) return;

        setIsLoadingAi(true);
        setAiResponse('');
        setAiError('');

        const langInstruction = language === 'zh' 
          ? "CRITICAL REQUIREMENT: YOU MUST RESPOND ENTIRELY IN SIMPLIFIED CHINESE (简体中文)." 
          : "Please respond entirely in English.";

        try {
          const response = await fetch('https://api.deepseek.com/chat/completions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
            body: JSON.stringify({
              model: 'deepseek-chat',
              messages: [
                {
                  role: 'system',
                  content: `You are an expert options trading analyst. Analyze the provided REAL news article and the current ${activeCompany.name} (${activeCompany.id}) stock price. Provide a specific technical and strategic opinion on whether a trader should buy ${activeCompany.id} call options right now. Provide 3 highly specific, actionable insights based on this catalyst. Format your response with clear bullet points. Keep it concise, professional, and forward-looking. ${langInstruction}`
                },
                {
                  role: 'user',
                  content: `Current ${activeCompany.id} Stock Price: $${prices[activeCompany.id] || 'Unknown'}\n\nNews Title: ${selectedArticle.title}\nDate: ${selectedArticle.date}\nSummary: ${selectedArticle.summary}`
                }
              ],
              temperature: 0.7,
              max_tokens: 600
            })
          });

          const data = await response.json();
          if (!response.ok) throw new Error(data.error?.message || `API Error: ${response.status}`);
          setAiResponse(data.choices[0].message.content);
        } catch (err) {
          console.error("DeepSeek API Error:", err);
          setAiError(err.message || (language === 'zh' ? "获取 AI 建议失败，请检查 API 密钥和网络。" : "Failed to fetch AI suggestions. Please check your API key and network connection."));
        } finally {
          setIsLoadingAi(false);
        }
      };

      const handleQuickAction = async (actionType) => {
        if (!apiKey) {
          setShowSettings(true);
          setQuickInsight({ type: null, text: '', loading: false, error: language === 'zh' ? '请先配置您的 API 密钥。' : 'Please configure your DeepSeek API key first.' });
          return;
        }
        if (!selectedArticle) return;
        
        setQuickInsight({ type: actionType, text: '', loading: true, error: '' });
        
        const langInstruction = language === 'zh' 
          ? "CRITICAL REQUIREMENT: YOU MUST RESPOND ENTIRELY IN SIMPLIFIED CHINESE (简体中文)." 
          : "Please respond entirely in English.";

        let systemPrompt = "";
        if (actionType === 'explain') {
          systemPrompt = `You are a tech educator. Read this real news article about ${activeCompany.name}. Explain the complex technology or business concept mentioned in simple terms (Explain Like I'm 5). Keep it to 2-3 short paragraphs. ${langInstruction}`;
        } else if (actionType === 'competitors') {
          systemPrompt = `You are an industry analyst. Briefly analyze how this real news about ${activeCompany.name} impacts its main competitors. Use bullet points and keep it concise. ${langInstruction}`;
        } else if (actionType === 'sentiment') {
          systemPrompt = `You are a financial sentiment analyzer. Rate the sentiment of this real news for ${activeCompany.id} stock as BULLISH, BEARISH, or NEUTRAL. Provide a score from 1-100 and a 1-sentence justification. Format your response cleanly. ${langInstruction}`;
        } else if (actionType === 'takeaways') {
          systemPrompt = `Extract the 3 most crucial factual takeaways from this real news article. Keep them strictly factual and brief. Use bullet points. ${langInstruction}`;
        } else if (actionType === 'risk') {
          systemPrompt = `Identify the top 2 biggest risks, drawbacks, or headwinds mentioned or implied by this real news for ${activeCompany.name}. Be highly critical and concise. Use bullet points. ${langInstruction}`;
        }

        try {
          const response = await fetch('https://api.deepseek.com/chat/completions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
            body: JSON.stringify({
              model: 'deepseek-chat',
              messages: [
                { role: 'system', content: systemPrompt },
                { role: 'user', content: `Title: ${selectedArticle.title}\nSummary: ${selectedArticle.summary}` }
              ],
              temperature: 0.7,
              max_tokens: 500
            })
          });

          const data = await response.json();
          if (!response.ok) throw new Error(data.error?.message || `API Error: ${response.status}`);
          const generatedText = data.choices[0].message.content;
          setQuickInsight({ type: actionType, text: generatedText, loading: false, error: '' });
        } catch (err) {
          console.error("DeepSeek API Error:", err);
          setQuickInsight(prev => ({ ...prev, loading: false, error: (language === 'zh' ? "获取洞察失败: " : "Failed to load insights. ") + err.message }));
        }
      };

      const handleSelectArticle = (article) => {
        setSelectedArticle(article);
        setAiResponse('');
        setAiError('');
        setQuickInsight({ type: null, text: '', loading: false, error: '' });
      };

      const toggleLanguage = () => setLanguage(prev => prev === 'en' ? 'zh' : 'en');

      return (
        <div className="min-h-screen bg-slate-50 flex flex-col h-[100dvh]">
          {/* Header & Multi-Ticker Dashboard */}
          <header className="bg-blue-900 text-white shadow-md flex-none z-20">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="flex flex-col md:flex-row justify-between md:items-center py-3 md:h-16 gap-3 md:gap-0">
                <div className="flex items-center justify-between">
                  <div className="flex items-center space-x-3">
                    <div className="bg-blue-600 p-1.5 md:p-2 rounded-lg">
                      <Newspaper className="w-5 h-5 md:w-6 md:h-6 text-white" />
                    </div>
                    <h1 className="text-lg md:text-xl font-bold tracking-tight">{t.appTitle}<span className="text-blue-300">{t.appTitleHighlight}</span></h1>
                  </div>
                  <div className="md:hidden flex items-center space-x-2">
                    <button onClick={toggleLanguage} className="flex items-center text-blue-200 hover:text-white px-2 py-1.5 rounded-lg border border-blue-700/50 bg-blue-800/30 text-xs font-bold">
                      <Globe className="w-4 h-4 mr-1" />{language === 'en' ? '中文' : 'EN'}
                    </button>
                    <button onClick={() => setShowSettings(true)} className="flex items-center text-blue-200 hover:text-white p-2">
                      <Settings className="w-5 h-5" />
                    </button>
                  </div>
                </div>

                <div className="flex overflow-x-auto no-scrollbar space-x-2 md:space-x-3 pb-1 md:pb-0 items-center snap-x">
                  {COMPANIES.map(company => (
                    <button 
                      key={company.id}
                      onClick={() => setActiveCompany(company)}
                      className={`flex items-center px-3 py-1.5 md:py-1.5 rounded-lg text-xs md:text-sm font-medium shadow-sm border transition-all cursor-pointer whitespace-nowrap snap-start focus:outline-none ${
                        activeCompany.id === company.id ? 'bg-blue-700/90 border-blue-400 ring-1 ring-blue-400' : 'bg-blue-800/40 border-transparent hover:bg-blue-800/80 hover:border-blue-600'
                      }`}
                    >
                      <TrendingUp className={`w-3 h-3 md:w-4 md:h-4 mr-1.5 ${activeCompany.id === company.id ? 'text-emerald-400' : 'text-slate-400'}`} />
                      <span className={`mr-1 ${activeCompany.id === company.id ? 'text-blue-100' : 'text-blue-300'}`}>{company.id}:</span>
                      <span className="font-bold text-white">
                        {isLoadingPrice ? '...' : (prices[company.id] && prices[company.id] !== 'N/A' ? `$${prices[company.id]}` : 'N/A')}
                      </span>
                    </button>
                  ))}
                  <div className="hidden md:flex items-center pl-2 space-x-2 border-l border-blue-700/50 ml-2">
                    <button onClick={toggleLanguage} className="flex items-center text-blue-200 hover:text-white hover:bg-blue-800 px-3 py-1.5 rounded-lg text-sm font-medium transition-colors">
                      <Globe className="w-4 h-4 mr-1.5" />{language === 'en' ? '中文' : 'EN'}
                    </button>
                    <button onClick={() => setShowSettings(true)} className="flex items-center bg-blue-800 hover:bg-blue-700 border border-transparent hover:border-blue-600 transition-colors px-3 py-1.5 rounded-lg text-sm font-medium shadow-sm">
                      <Settings className="w-4 h-4 mr-1.5" /><span>{t.settings}</span>
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </header>

          <main className="flex-1 max-w-7xl mx-auto w-full lg:px-8 lg:py-6 overflow-hidden relative">
            <div className="flex flex-col lg:flex-row gap-0 lg:gap-6 h-full absolute inset-0 lg:static">
              
              {/* Left Column: Live News Feed */}
              <div className={`w-full lg:w-1/3 flex-col h-full bg-slate-50 lg:bg-transparent p-4 lg:p-0 ${selectedArticle ? 'hidden lg:flex' : 'flex'}`}>
                <div className="flex items-center justify-between mb-3 lg:mb-4 flex-none">
                  <h2 className="text-lg font-semibold text-slate-700 flex items-center">
                    <span className="relative flex h-3 w-3 mr-3">
                      <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                      <span className="relative inline-flex rounded-full h-3 w-3 bg-red-500"></span>
                    </span>
                    {activeCompany.name} {t.news}
                  </h2>
                  <span className="text-xs font-bold bg-red-100 text-red-700 px-2 py-1 rounded-md">{t.live}</span>
                </div>
                
                <div className="flex-1 overflow-y-auto space-y-3 lg:space-y-4 lg:pr-2 custom-scrollbar pb-6 lg:pb-0">
                  {isLoadingNews ? (
                    <div className="flex flex-col items-center justify-center py-12 text-slate-400">
                      <Loader2 className="w-8 h-8 animate-spin mb-4 text-blue-500" />
                      <p>Fetching latest worldwide news...</p>
                    </div>
                  ) : (
                    news.map((article) => (
                      <div 
                        key={article.id}
                        onClick={() => handleSelectArticle(article)}
                        className={`p-4 rounded-xl border transition-all cursor-pointer ${
                          selectedArticle?.id === article.id 
                            ? 'bg-blue-50 border-blue-400 shadow-md ring-1 ring-blue-400 lg:shadow-sm lg:ring-0' 
                            : 'bg-white border-slate-200 hover:border-blue-300 shadow-sm'
                        }`}
                      >
                        <div className="text-xs font-medium text-slate-500 mb-2">{article.date}</div>
                        <h3 className={`font-bold leading-snug mb-2 ${selectedArticle?.id === article.id ? 'text-blue-900' : 'text-slate-800'}`}>
                          {article.title}
                        </h3>
                        <p className="text-sm text-slate-600 line-clamp-2">
                          {article.summary}
                        </p>
                      </div>
                    ))
                  )}
                </div>
              </div>

              {/* Right Column: Article Details & AI Analyst */}
              <div className={`w-full lg:w-2/3 flex-col h-full bg-white lg:rounded-2xl lg:border border-slate-200 shadow-sm overflow-hidden ${!selectedArticle ? 'hidden lg:flex' : 'flex'}`}>
                {selectedArticle ? (
                  <div className="flex flex-col h-full overflow-y-auto custom-scrollbar relative">
                    <div className="lg:hidden p-3 border-b border-slate-100 flex items-center bg-white sticky top-0 z-10 shadow-sm">
                      <button onClick={() => setSelectedArticle(null)} className="flex items-center text-blue-600 hover:text-blue-800 font-semibold px-2 py-1">
                        <ArrowLeft className="w-5 h-5 mr-2" /> {t.backToNews} {activeCompany.name}
                      </button>
                    </div>

                    <div className="p-5 md:p-8 border-b border-slate-100 bg-slate-50/50">
                      <div className="inline-block px-3 py-1 rounded-full bg-slate-200 text-slate-700 text-xs font-semibold mb-3 md:mb-4">
                        {selectedArticle.date}
                      </div>
                      <h2 className="text-xl md:text-3xl font-extrabold text-slate-900 mb-3 md:mb-4 leading-tight">
                        {selectedArticle.title}
                      </h2>
                      <p className="text-slate-700 md:text-lg leading-relaxed text-sm md:text-base">
                        {selectedArticle.summary}
                      </p>
                      <a href={selectedArticle.url} target="_blank" rel="noopener noreferrer" className="inline-flex items-center mt-4 text-blue-600 hover:text-blue-800 font-medium text-sm md:text-base">
                        {t.readFull} <ExternalLink className="w-4 h-4 ml-1" />
                      </a>

                      <div className="mt-8 pt-6 border-t border-slate-200">
                        <h4 className="text-xs md:text-sm font-bold text-slate-500 uppercase tracking-wider mb-3 flex items-center">
                          <Sparkles className="w-4 h-4 mr-2 text-amber-500" />{t.quickInsights}
                        </h4>
                        
                        <div className="flex flex-wrap gap-2 mb-4">
                          <button onClick={() => handleQuickAction('explain')} disabled={quickInsight.loading} className={`flex items-center px-3 py-2 rounded-lg text-xs md:text-sm font-medium transition-colors border ${quickInsight.type === 'explain' ? 'bg-amber-50 border-amber-300 text-amber-800' : 'bg-white border-slate-200 text-slate-700 hover:bg-slate-50'}`}>
                            {quickInsight.loading && quickInsight.type === 'explain' ? <Loader2 className="w-4 h-4 mr-2 animate-spin text-amber-600" /> : <Cpu className="w-4 h-4 mr-1.5 text-amber-600" />}{t.explainTech}
                          </button>
                          <button onClick={() => handleQuickAction('competitors')} disabled={quickInsight.loading} className={`flex items-center px-3 py-2 rounded-lg text-xs md:text-sm font-medium transition-colors border ${quickInsight.type === 'competitors' ? 'bg-rose-50 border-rose-300 text-rose-800' : 'bg-white border-slate-200 text-slate-700 hover:bg-slate-50'}`}>
                            {quickInsight.loading && quickInsight.type === 'competitors' ? <Loader2 className="w-4 h-4 mr-2 animate-spin text-rose-600" /> : <Swords className="w-4 h-4 mr-1.5 text-rose-600" />}{t.competitors}
                          </button>
                          <button onClick={() => handleQuickAction('sentiment')} disabled={quickInsight.loading} className={`flex items-center px-3 py-2 rounded-lg text-xs md:text-sm font-medium transition-colors border ${quickInsight.type === 'sentiment' ? 'bg-indigo-50 border-indigo-300 text-indigo-800' : 'bg-white border-slate-200 text-slate-700 hover:bg-slate-50'}`}>
                            {quickInsight.loading && quickInsight.type === 'sentiment' ? <Loader2 className="w-4 h-4 mr-2 animate-spin text-indigo-600" /> : <BarChart className="w-4 h-4 mr-1.5 text-indigo-600" />}{t.sentiment}
                          </button>
                          <button onClick={() => handleQuickAction('takeaways')} disabled={quickInsight.loading} className={`flex items-center px-3 py-2 rounded-lg text-xs md:text-sm font-medium transition-colors border ${quickInsight.type === 'takeaways' ? 'bg-emerald-50 border-emerald-300 text-emerald-800' : 'bg-white border-slate-200 text-slate-700 hover:bg-slate-50'}`}>
                            {quickInsight.loading && quickInsight.type === 'takeaways' ? <Loader2 className="w-4 h-4 mr-2 animate-spin text-emerald-600" /> : <ListChecks className="w-4 h-4 mr-1.5 text-emerald-600" />}{t.takeaways}
                          </button>
                          <button onClick={() => handleQuickAction('risk')} disabled={quickInsight.loading} className={`flex items-center px-3 py-2 rounded-lg text-xs md:text-sm font-medium transition-colors border ${quickInsight.type === 'risk' ? 'bg-orange-50 border-orange-300 text-orange-800' : 'bg-white border-slate-200 text-slate-700 hover:bg-slate-50'}`}>
                            {quickInsight.loading && quickInsight.type === 'risk' ? <Loader2 className="w-4 h-4 mr-2 animate-spin text-orange-600" /> : <ShieldAlert className="w-4 h-4 mr-1.5 text-orange-600" />}{t.riskCheck}
                          </button>
                        </div>

                        {quickInsight.error && (
                          <div className="text-sm text-red-600 bg-red-50 p-3 rounded-lg border border-red-100 mb-4 flex items-start">
                             <AlertCircle className="w-4 h-4 mr-2 mt-0.5 flex-shrink-0" />{quickInsight.error}
                          </div>
                        )}
                        
                        {quickInsight.text && !quickInsight.loading && (
                          <div className="bg-white border border-slate-200 p-4 md:p-5 rounded-xl text-slate-700 text-sm md:text-base shadow-sm mt-2">
                            {quickInsight.text.split('\n').map((line, i) => {
                              if (line.trim() === '') return <br key={i} />;
                              const parts = line.split(/(\*\*.*?\*\*)/g);
                              return (
                                <p key={i} className="mb-1">
                                  {parts.map((part, j) => part.startsWith('**') && part.endsWith('**') ? <strong key={j} className="text-slate-900">{part.slice(2, -2)}</strong> : part)}
                                </p>
                              );
                            })}
                          </div>
                        )}
                      </div>
                    </div>

                    <div className="p-5 md:p-8 flex flex-col bg-slate-50/50 border-t border-slate-200 flex-1">
                      <div className="flex flex-col sm:flex-row sm:items-center justify-between mb-6 gap-4">
                        <h3 className="text-lg md:text-xl font-bold text-slate-800 flex items-center">
                          <BrainCircuit className="w-5 h-5 md:w-6 md:h-6 mr-2 text-purple-600" />{t.optionsAnalysis}
                        </h3>
                        <button onClick={getAiSuggestion} disabled={isLoadingAi} className="bg-purple-600 hover:bg-purple-700 disabled:bg-purple-400 text-white px-4 py-2 md:px-5 md:py-2.5 rounded-lg text-sm md:text-base font-medium flex items-center justify-center transition-colors shadow-sm w-full sm:w-auto">
                          {isLoadingAi ? <Loader2 className="w-4 h-4 md:w-5 md:h-5 mr-2 animate-spin" /> : <TrendingUp className="w-4 h-4 md:w-5 md:h-5 mr-2" />}
                          {isLoadingAi ? t.analyzing : t.analyzeOptions}
                        </button>
                      </div>

                      {aiError && (
                        <div className="bg-red-50 border border-red-200 text-red-700 p-4 rounded-xl flex items-start mb-6">
                          <AlertCircle className="w-5 h-5 mr-3 mt-0.5 flex-shrink-0" /><div className="text-sm">{aiError}</div>
                        </div>
                      )}

                      {aiResponse ? (
                        <div className="prose prose-slate max-w-none text-slate-700 bg-purple-50/30 p-5 md:p-6 rounded-xl border border-purple-100 text-sm md:text-base">
                          {aiResponse.split('\n').map((line, i) => {
                            if (line.trim() === '') return <br key={i} />;
                            const parts = line.split(/(\*\*.*?\*\*)/g);
                            return (
                              <p key={i} className="mb-2">
                                {parts.map((part, j) => part.startsWith('**') && part.endsWith('**') ? <strong key={j} className="text-slate-900">{part.slice(2, -2)}</strong> : part)}
                              </p>
                            );
                          })}
                        </div>
                      ) : (
                        !isLoadingAi && !aiError && (
                          <div className="flex flex-col items-center justify-center text-center p-8 md:p-12 border-2 border-dashed border-slate-200 rounded-xl bg-slate-50 flex-1 my-4">
                            <div className="bg-purple-100 p-3 md:p-4 rounded-full mb-3 md:mb-4">
                              <BrainCircuit className="w-6 h-6 md:w-8 md:h-8 text-purple-600" />
                            </div>
                            <h4 className="text-base md:text-lg font-semibold text-slate-800 mb-2">{t.readyForAnalysis}</h4>
                            <p className="text-xs md:text-sm text-slate-500 max-w-sm">{t.readyDesc} {activeCompany.id}.</p>
                          </div>
                        )
                      )}
                    </div>
                  </div>
                ) : (
                  <div className="flex items-center justify-center h-full text-slate-500">
                    <div className="flex flex-col items-center">
                      <Newspaper className="w-12 h-12 text-slate-300 mb-4" />
                      <p>{t.selectArticle}</p>
                    </div>
                  </div>
                )}
              </div>
            </div>
          </main>

          {showSettings && (
            <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-50 p-4">
              <div className="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden animate-in fade-in zoom-in duration-200">
                <div className="p-5 md:p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                  <h3 className="text-lg md:text-xl font-bold flex items-center text-slate-800">
                    <Key className="w-5 h-5 mr-2 text-slate-500" />{t.apiConfig}
                  </h3>
                  <button onClick={() => setShowSettings(false)} className="text-slate-400 hover:text-slate-600 transition-colors p-1">✕</button>
                </div>
                <form onSubmit={handleSaveKey} className="p-5 md:p-6">
                  <div className="mb-4">
                    <label className="block text-sm font-semibold text-slate-700 mb-2">{t.apiKeyStr}</label>
                    <input type="password" value={apiKey} onChange={(e) => setApiKey(e.target.value)} placeholder="sk-..." className="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" required />
                    <p className="text-xs text-slate-500 mt-2">{t.apiDesc}</p>
                  </div>
                  <div className="flex justify-end space-x-3 mt-6 md:mt-8">
                    <button type="button" onClick={() => setShowSettings(false)} className="px-4 py-2 text-slate-600 hover:bg-slate-100 rounded-lg text-sm md:text-base font-medium transition-colors">{t.cancel}</button>
                    <button type="submit" className="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm md:text-base font-medium transition-colors">{t.save}</button>
                  </div>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
